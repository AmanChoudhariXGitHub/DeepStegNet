services:
  - type: web
    name: deepstegnet
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python setup.py
    startCommand: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
      - key: PORT
        value: 8501
    disk:
      name: stego-data
      mountPath: /var/data
      sizeGB: 1
