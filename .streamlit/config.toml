[theme]
primaryColor = "#FF6B35"
backgroundColor = "#F7F7F7"
secondaryBackgroundColor = "#E0E0E0"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[logger]
level = "error"

[server]
headless = true
port = 8501
enableXsrfProtection = true
enableCORS = false
